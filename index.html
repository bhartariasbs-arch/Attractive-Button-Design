<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Now Button Making</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'poppins'
        }

        body {
            height: 100vh;
            width: 100vw;
            background-size: cover;
            overflow: auto;
            text-overflow: auto;
        }

        button {
            border: none;
            background-color: rgb(12, 11, 11);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            padding: 5px;
            color: white;
            margin: 250px auto;
            width: 200px;
            font-weight: bolder;
            text-align: center;
            gap: 10px;
            place-items: center;
            align-items: center;
            font-size: 23px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        h1{
            display: inline-block;
            position:relative;
            bottom: 5px;
            transition: 0.3s ease;
        }

        button:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.722);
            text-shadow: 0px 1px 10px rgb(159, 159, 159);
            transition: all 0.35s ease;
            
        }
        button > h1:hover{
            text-shadow: 0px 2px 10px rgb(0, 255, 85);

        }
    </style>
</head>

<body>
    <button>Pay Now <h1>💵</h1></button>
</body>

</html>
